<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth — LoginPage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
  <canvas id="particles"></canvas>

  <a href="index.html" class="back-link">← Back</a>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-header">
        <div class="auth-logo">Jozzy</div>
        <h1 class="auth-title" id="authTitle">Welcome back</h1>
        <p class="auth-sub" id="authSub">Sign in to your account</p>
      </div>

      <form id="loginForm" class="auth-form" autocomplete="off" novalidate>

        <div class="field-group" id="nameGroup" style="display:none">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Your name" />
        </div>

        <div class="field-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="••••••••" required />
            <button type="button" class="toggle-pass" id="togglePass">Show</button>
          </div>
        </div>

        <div id="errorMsg" class="error-msg" style="display:none"></div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
          <span id="btnText">Sign In</span>
          <span id="btnLoader" class="loader" style="display:none"></span>
        </button>
      </form>

      <div class="auth-divider"></div>

      <div class="auth-switch">
        <span id="switchText">Don't have an account?</span>
        <button id="switchBtn" class="link-btn">Register</button>
      </div>

    </div>
  </div>

  <script src="particles.js"></script>
  <script src="app.js"></script>
</body>
</html>
